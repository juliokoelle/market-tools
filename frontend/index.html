<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Briefing — Market Tools</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Market Tools" />
  <style>
    /* ─── Design tokens (matches dashboard.html exactly) ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f4f6f9;
      --surface: #ffffff;
      --border:  #e5e7eb;
      --ink:     #1a1a2e;
      --muted:   #6b7280;
      --faint:   #9ca3af;
      --accent:  #4f46e5;
      --green:   #16a34a;
      --red:     #dc2626;
      --shadow:  0 1px 4px rgba(0,0,0,0.08);
      --radius:  12px;
      --sans:    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --serif:   Georgia, "Times New Roman", Times, serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ═══════════════════════════════════════
       NAV  — identical to dashboard.html
    ═══════════════════════════════════════ */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 30;
    }

    .nav-brand {
      font-size: 1rem;
      font-weight: 700;
      color: var(--ink);
      text-decoration: none;
      padding: 18px 24px 18px 0;
      margin-right: 8px;
      border-right: 1px solid var(--border);
      white-space: nowrap;
    }

    .nav-link {
      padding: 18px 16px;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 2px solid transparent;
      transition: color 0.15s;
      white-space: nowrap;
    }
    .nav-link:hover        { color: var(--ink); }
    .nav-link.active       { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

    /* Ticker strip — lightweight, in the nav right side */
    .nav-ticker {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 20px;
      overflow: hidden;
      max-width: 480px;
    }

    .nav-ticker-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .nav-ticker-item .t-sym  { font-weight: 700; color: var(--ink); }
    .nav-ticker-item .t-val  { color: var(--muted); }
    .nav-ticker-item .t-up   { color: var(--green); font-weight: 600; }
    .nav-ticker-item .t-down { color: var(--red);   font-weight: 600; }

    @media (max-width: 700px) { .nav-ticker { display: none; } }

    /* ═══════════════════════════════════════
       PAGE LAYOUT
    ═══════════════════════════════════════ */
    .page {
      max-width: 1160px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }

    /* Page header */
    .page-header {
      margin-bottom: 24px;
    }

    .page-header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--ink);
    }

    .page-header p {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* Two-column grid */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 292px;
      gap: 24px;
      align-items: start;
    }

    @media (max-width: 900px) {
      .dashboard-grid { grid-template-columns: 1fr; }
    }

    /* ═══════════════════════════════════════
       CARD  — identical to dashboard.html
    ═══════════════════════════════════════ */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 0;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .card-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ═══════════════════════════════════════
       GENERATE BUTTON — small, secondary
    ═══════════════════════════════════════ */
    #generateBtn {
      font-family: var(--sans);
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--accent);
      background: #eef2ff;
      border: none;
      border-radius: 6px;
      padding: 5px 12px;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    #generateBtn:hover:not(:disabled) { background: #e0e7ff; }
    #generateBtn:disabled { opacity: 0.5; cursor: not-allowed; }

    #generateStatus {
      font-size: 0.72rem;
      color: var(--faint);
      text-align: right;
    }
    #generateStatus.ok    { color: var(--green); }
    #generateStatus.error { color: var(--red); }

    /* ═══════════════════════════════════════
       BRIEFING BODY — editorial typography
       (serif, two-col flow inside the card)
    ═══════════════════════════════════════ */
    .briefing-loading,
    .briefing-error {
      font-size: 0.875rem;
      color: var(--faint);
      text-align: center;
      padding: 48px 0;
    }
    .briefing-error { color: var(--red); }

    .briefing-body {
      columns: 2;
      column-gap: 36px;
      column-rule: 1px solid var(--border);
    }

    @media (max-width: 640px) {
      .briefing-body { columns: 1; column-rule: none; }
      .briefing-body h2 { column-span: unset; }
      .briefing-body hr  { column-span: unset; }
    }

    /* Section headings span both columns */
    .briefing-body h2 {
      column-span: all;
      font-family: var(--sans);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-top: 1px solid var(--border);
      padding-top: 20px;
      margin-top: 24px;
      margin-bottom: 14px;
    }

    .briefing-body h2:first-child {
      margin-top: 0;
      padding-top: 0;
      border-top: none;
    }

    /* The section label text */
    .briefing-section-label {
      display: block;
    }

    /* Sub-headings — serif, editorial */
    .briefing-body h3 {
      font-family: var(--serif);
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.3;
      color: var(--ink);
      margin-top: 16px;
      margin-bottom: 8px;
      break-inside: avoid;
    }

    /* Body paragraphs — serif for editorial feel */
    .briefing-body p {
      font-family: var(--serif);
      font-size: 0.93rem;
      line-height: 1.8;
      color: #374151;
      margin-bottom: 12px;
      hyphens: auto;
      break-inside: avoid;
    }

    .briefing-body strong { font-weight: 700; }
    .briefing-body em     { font-style: italic; }

    .briefing-body ul {
      margin: 4px 0 12px 16px;
      break-inside: avoid;
    }
    .briefing-body ul li {
      font-family: var(--serif);
      font-size: 0.9rem;
      line-height: 1.65;
      color: #374151;
      margin-bottom: 4px;
      list-style: disc;
    }

    .briefing-body hr {
      column-span: all;
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }

    /* ═══════════════════════════════════════
       SIDEBAR STACK
    ═══════════════════════════════════════ */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: sticky;
      top: 72px;   /* clear the sticky nav */
    }

    /* ── Market snapshot rows ── */
    .mkt-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.82rem;
    }
    .mkt-row:last-child { border-bottom: none; }

    .mkt-name  { font-weight: 600; color: var(--ink); }
    .mkt-right { text-align: right; }
    .mkt-price { font-weight: 700; font-size: 0.85rem; color: var(--ink); }
    .mkt-sub   { font-size: 0.68rem; color: var(--faint); margin-top: 1px; }
    .mkt-up    { color: var(--green); }
    .mkt-down  { color: var(--red);   }

    .mkt-loading {
      font-size: 0.8rem;
      color: var(--faint);
      text-align: center;
      padding: 16px 0;
    }

    /* ── Portfolio rows ── */
    .port-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.82rem;
    }
    .port-row:last-child { border-bottom: none; }

    .port-left  { }
    .port-ticker { font-weight: 700; color: var(--ink); font-size: 0.85rem; }
    .port-name   { font-size: 0.68rem; color: var(--faint); margin-top: 1px; }
    .port-right  { text-align: right; }
    .port-price  { font-weight: 700; font-size: 0.85rem; color: var(--ink); }
    .port-value  { font-size: 0.68rem; color: var(--faint); margin-top: 1px; }

    .widget-footer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
    }

    .widget-footer-row span { color: var(--muted); font-weight: 600; }

    .widget-footer-row a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.75rem;
    }
    .widget-footer-row a:hover { text-decoration: underline; }

    /* ── Date in card header ── */
    #mastheadDate {
      font-size: 0.72rem;
      color: var(--faint);
      font-weight: 400;
    }

    @media (max-width: 560px) {
      .nav-brand { display: none; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════
     NAV
════════════════════════════════════ -->
<nav>
  <a class="nav-brand" href="index.html">Market Tools</a>
  <a class="nav-link active" href="index.html">Home</a>
  <a class="nav-link" href="dashboard.html">Dashboard</a>

  <!-- Live ticker embedded in nav right side -->
  <div class="nav-ticker" id="navTicker">
    <!-- Populated by JS after market data loads -->
  </div>
</nav>

<!-- ═══════════════════════════════════
     PAGE
════════════════════════════════════ -->
<div class="page">

  <!-- Page header -->
  <div class="page-header">
    <h1>Daily Global Economic Briefing</h1>
    <p id="todayDate">Markets · Commodities · Geopolitics · Analysis</p>
  </div>

  <!-- Two-column dashboard grid -->
  <div class="dashboard-grid">

    <!-- ── Main: Daily Briefing card ── -->
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-label">Today's Briefing</div>
          <div id="mastheadDate" style="font-size:0.72rem; color:var(--faint); margin-top:2px;"></div>
        </div>
        <div style="display:flex; flex-direction:column; align-items:flex-end; gap:4px;">
          <button id="generateBtn" onclick="generateBriefing()">↻ Generate</button>
          <span id="generateStatus"></span>
        </div>
      </div>

      <div id="briefingContent" class="briefing-loading">Loading today's briefing…</div>
    </div>

    <!-- ── Sidebar ── -->
    <aside class="sidebar">

      <!-- Market Snapshot -->
      <div class="card">
        <div class="card-header" style="margin-bottom:12px;">
          <div class="card-label">Market Snapshot</div>
        </div>
        <div id="marketSnapshot">
          <div class="mkt-loading">Fetching prices…</div>
        </div>
      </div>

      <!-- My Portfolio -->
      <div class="card">
        <div class="card-header" style="margin-bottom:12px;">
          <div class="card-label">My Portfolio</div>
        </div>
        <div id="portfolioWidget">
          <div class="mkt-loading">Fetching positions…</div>
        </div>
        <div class="widget-footer-row">
          <span id="portfolioTotal">—</span>
          <a href="dashboard.html">Full analysis →</a>
        </div>
      </div>

    </aside>
  </div>
</div>

<script>
  const API_BASE = "https://market-tools.onrender.com";

  /* ── Date ── */
  const now = new Date();
  const fmtLong  = now.toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
  const fmtShort = now.toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" });
  document.getElementById("mastheadDate").textContent = fmtLong;
  document.getElementById("todayDate").textContent    = fmtShort;

  /* ═══════════════════════════════════════
     MARKET DATA
  ══════════════════════════════════════ */
  const SNAPSHOT_TICKERS = [
    { sym: "^GSPC",    label: "S&P 500"  },
    { sym: "^IXIC",    label: "Nasdaq"   },
    { sym: "GC=F",     label: "Gold"     },
    { sym: "BZ=F",     label: "Brent"    },
    { sym: "EURUSD=X", label: "EUR/USD"  },
  ];

  // Edit these to match your actual holdings
  const MY_PORTFOLIO = [
    { ticker: "AAPL", name: "Apple",    shares: 10 },
    { ticker: "MSFT", name: "Microsoft",shares: 5  },
    { ticker: "NVDA", name: "NVIDIA",   shares: 8  },
    { ticker: "TSLA", name: "Tesla",    shares: 4  },
    { ticker: "AMZN", name: "Amazon",   shares: 3  },
  ];

  function fmtPrice(v) {
    if (v == null) return "—";
    if (v < 10)    return v.toFixed(4);
    return v.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function loadMarketData() {
    const all = [
      ...SNAPSHOT_TICKERS.map(t => t.sym),
      ...MY_PORTFOLIO.map(p => p.ticker),
    ];

    fetch(`${API_BASE}/market/prices?tickers=${all.join(",")}`)
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(data => {
        const prices = data.prices ?? {};
        renderSnapshot(prices);
        renderPortfolio(prices);
        renderNavTicker(prices);
      })
      .catch(err => {
        console.error("Market data error:", err);
        document.getElementById("marketSnapshot").innerHTML  = '<div class="mkt-loading">Unavailable</div>';
        document.getElementById("portfolioWidget").innerHTML = '<div class="mkt-loading">Unavailable</div>';
      });
  }

  function renderSnapshot(prices) {
    document.getElementById("marketSnapshot").innerHTML =
      SNAPSHOT_TICKERS.map(({ sym, label }) => {
        const p = prices[sym];
        return `
          <div class="mkt-row">
            <span class="mkt-name">${label}</span>
            <div class="mkt-right">
              <div class="mkt-price">${fmtPrice(p)}</div>
              <div class="mkt-sub">Live</div>
            </div>
          </div>`;
      }).join("");
  }

  function renderPortfolio(prices) {
    let total = 0;
    document.getElementById("portfolioWidget").innerHTML =
      MY_PORTFOLIO.map(({ ticker, name, shares }) => {
        const p = prices[ticker];
        const v = p != null ? p * shares : null;
        if (v != null) total += v;
        return `
          <div class="port-row">
            <div class="port-left">
              <div class="port-ticker">${ticker}</div>
              <div class="port-name">${name} · ${shares} sh</div>
            </div>
            <div class="port-right">
              <div class="port-price">${fmtPrice(p)}</div>
              <div class="port-value">${v != null ? "$" + v.toLocaleString("en-US", {maximumFractionDigits:0}) : "—"}</div>
            </div>
          </div>`;
      }).join("");

    document.getElementById("portfolioTotal").textContent =
      total > 0 ? `$${total.toLocaleString("en-US", {maximumFractionDigits:0})}` : "Live prices";
  }

  function renderNavTicker(prices) {
    document.getElementById("navTicker").innerHTML =
      SNAPSHOT_TICKERS.map(({ sym, label }) => {
        const p = prices[sym];
        return `
          <div class="nav-ticker-item">
            <span class="t-sym">${label}</span>
            <span class="t-val">${fmtPrice(p)}</span>
          </div>`;
      }).join("");
  }

  /* ═══════════════════════════════════════
     MARKDOWN → HTML
  ══════════════════════════════════════ */
  function mdToHtml(md) {
    const esc = s => s
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");

    const inline = s => esc(s)
      .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
      .replace(/\*(.+?)\*/g,     "<em>$1</em>")
      .replace(/`(.+?)`/g,       "<code>$1</code>");

    const lines     = md.split("\n");
    const blocks    = [];
    let paraLines   = [];
    let inList      = false;

    const flushPara = () => {
      if (!paraLines.length) return;
      blocks.push(`<p>${paraLines.join(" ")}</p>`);
      paraLines = [];
    };
    const closeList = () => {
      if (!inList) return;
      blocks.push("</ul>");
      inList = false;
    };

    for (const raw of lines) {
      const line = raw.trimEnd();

      if (/^## /.test(line)) {
        flushPara(); closeList();
        blocks.push(`<h2><span class="briefing-section-label">${esc(line.slice(3).trim())}</span></h2>`);
        continue;
      }
      if (/^### /.test(line)) {
        flushPara(); closeList();
        blocks.push(`<h3>${inline(line.slice(4).trim())}</h3>`);
        continue;
      }
      if (/^-{3,}$/.test(line.trim())) {
        flushPara(); closeList();
        blocks.push("<hr />");
        continue;
      }
      if (/^[-*] /.test(line)) {
        flushPara();
        if (!inList) { blocks.push("<ul>"); inList = true; }
        blocks.push(`<li>${inline(line.slice(2).trim())}</li>`);
        continue;
      }
      if (line.trim() === "") {
        flushPara(); closeList();
        continue;
      }
      closeList();
      paraLines.push(inline(line.trim()));
    }

    flushPara();
    closeList();
    return blocks.join("\n");
  }

  /* ═══════════════════════════════════════
     BRIEFING — fetch + render
  ══════════════════════════════════════ */
  function loadBriefing() {
    const el = document.getElementById("briefingContent");
    el.className   = "briefing-loading";
    el.textContent = "Loading today's briefing…";

    fetch(`${API_BASE}/daily-briefing`)
      .then(res => {
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      })
      .then(data => {
        if (!data.briefing) throw new Error("Empty briefing");
        el.className = "briefing-body";
        el.innerHTML = mdToHtml(data.briefing);
      })
      .catch(err => {
        console.error("Briefing fetch failed:", err);
        el.className   = "briefing-error";
        el.textContent = "Today's briefing is currently unavailable. Please check back shortly.";
      });
  }

  /* ═══════════════════════════════════════
     GENERATE
  ══════════════════════════════════════ */
  function generateBriefing() {
    const btn    = document.getElementById("generateBtn");
    const status = document.getElementById("generateStatus");

    btn.disabled       = true;
    btn.textContent    = "↻ Updating…";
    status.className   = "";
    status.textContent = "Updating…";

    fetch(`${API_BASE}/generate-briefing`, { method: "POST" })
      .then(res => {
        if (!res.ok) return res.json().then(e => { throw new Error(e.detail || `Error ${res.status}`); });
        return res.json();
      })
      .then(data => {
        status.className   = "ok";
        status.textContent = `Done · ${data.words ?? "—"} words`;
        loadBriefing();
      })
      .catch(err => {
        console.error("Generate error:", err);
        status.className   = "error";
        status.textContent = "Failed — " + err.message;
      })
      .finally(() => {
        btn.disabled    = false;
        btn.textContent = "↻ Generate";
      });
  }

  /* ── Boot ── */
  loadBriefing();
  loadMarketData();
</script>

</body>
</html>
