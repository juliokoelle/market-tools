name: Morning Push
on:
  schedule:
    - cron: '30 6 * * *'  # 06:30 UTC = 08:30 CEST
  workflow_dispatch:
jobs:
  morning-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Send morning push
        env:
          GITHUB_TOKEN: ${{ secrets.BRAIN_GITHUB_TOKEN }}
          JULIO_BRAIN_OWNER: ${{ secrets.JULIO_BRAIN_OWNER }}
          JULIO_BRAIN_REPO_NAME: ${{ secrets.JULIO_BRAIN_REPO_NAME }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m scripts.morning_push
