# Coolify-Deployment: FastAPI-Backend + Telegram-Bot aus EINEM Image.
# Beide Services teilen sich das via Dockerfile gebaute Image (build: .),
# nur das Start-Kommando unterscheidet sich.
# Env-Vars werden in der Coolify-UI gesetzt (NICHT hier committen).
services:
  backend:
    build: .
    command: uvicorn scripts.api:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    # Coolify "Magic FQDN": setzt öffentliche Domain + Traefik-Routing auf Port 8000,
    # HTTPS-Zertifikat (Let's Encrypt) wird automatisch geholt. sslip.io zeigt auf die VPS-IP.
    environment:
      - SERVICE_FQDN_BACKEND_8000=https://api.178-104-138-156.sslip.io
    expose:
      - "8000"

  telegram-bot:
    build: .
    command: python -m scripts.telegram_bot
    restart: unless-stopped
    # Kein Port: Polling-Bot, braucht keinen eingehenden Verkehr.
