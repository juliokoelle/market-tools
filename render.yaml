services:
  - type: web
    name: market-tools-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn scripts.api:app --host 0.0.0.0 --port $PORT
    autoDeploy: true

  - type: web
    name: market-tools-frontend
    env: static
    plan: free
    staticPublishPath: ./frontend
    buildCommand: ""
    autoDeploy: true
