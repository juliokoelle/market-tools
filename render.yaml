services:
  - type: web
    name: market-tools-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn scripts.api:app --host 0.0.0.0 --port $PORT
    autoDeploy: true

  - type: web
    name: market-tools-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        value: https://market-tools-backend.onrender.com

  - type: cron
    name: gmail-briefing-cron
    env: python
    plan: free
    schedule: "15 6 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m scripts.run_gmail_briefing

  - type: cron
    name: keep-alive-ping
    env: python
    plan: free
    schedule: "*/10 * * * *"
    startCommand: python -c "import urllib.request; urllib.request.urlopen('https://market-tools-backend.onrender.com/health', timeout=30)"

  - type: worker
    name: telegram-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m scripts.telegram_bot
